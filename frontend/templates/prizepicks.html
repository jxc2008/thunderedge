<!-- frontend/templates/prizepicks.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThunderEdge | PrizePicks Kill Line Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #000000;
            color: #e4e4e7;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .page-header {
            background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
            border-bottom: 1px solid #27272a;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6 0%, #0ea5e9 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        
        .header-nav {
            display: flex;
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        
        .header-nav a {
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #a1a1aa;
        }
        
        .header-nav a:hover, .header-nav a.active {
            color: #ffffff;
            background: #18181b;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .hero-section {
            text-align: center;
            padding: 3rem 0 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 1.125rem;
            color: #71717a;
            margin-bottom: 3rem;
            font-weight: 400;
        }
        
        .search-section {
            background: #0a0a0a;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        
        .search-box {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            min-width: 200px;
        }
        
        .input-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #a1a1aa;
            letter-spacing: 0.01em;
        }
        
        input {
            padding: 0.875rem 1rem;
            border: 1px solid #27272a;
            border-radius: 8px;
            background: #18181b;
            color: #ffffff;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }
        
        input:focus {
            border-color: #3b82f6;
            background: #18181b;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        input:hover {
            border-color: #3f3f46;
        }
        
        input[type="number"] {
            max-width: 140px;
        }
        
        button {
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, #3b82f6 0%, #0ea5e9 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 3rem;
            background: #0a0a0a;
            border: 1px solid #27272a;
            border-radius: 12px;
        }
        
        .spinner {
            border: 3px solid #27272a;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading p {
            color: #a1a1aa;
            margin: 0.5rem 0;
        }
        
        .result {
            display: none;
        }
        
        .performance-bar {
            background: #0a0a0a;
            border: 1px solid #27272a;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.875rem;
        }
        
        .perf-item {
            color: #71717a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .perf-item span {
            color: #3b82f6;
            font-weight: 600;
        }
        
        .player-card {
            background: linear-gradient(135deg, #0a0a0a 0%, #18181b 100%);
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .player-info h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.25rem;
        }
        
        .team-name {
            color: #71717a;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .over-under-box {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.03) 0%, rgba(0, 0, 0, 0) 50%, rgba(239, 68, 68, 0.03) 100%);
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 2.5rem;
            margin: 2rem 0;
        }
        
        .over-under-title {
            font-size: 0.875rem;
            color: #71717a;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .over-under-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            flex-wrap: wrap;
        }
        
        .over-stat, .under-stat {
            text-align: center;
            padding: 1.5rem;
            border-radius: 10px;
            min-width: 160px;
        }
        
        .over-stat {
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .under-stat {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .over-stat .percentage {
            font-size: 3.5rem;
            font-weight: 700;
            color: #22c55e;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        
        .under-stat .percentage {
            font-size: 3.5rem;
            font-weight: 700;
            color: #ef4444;
            line-height: 1;
            letter-spacing: -0.02em;
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: #71717a;
            margin-top: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        
        .vs-divider {
            font-size: 1.5rem;
            color: #3f3f46;
            font-weight: 600;
        }
        
        .map-count {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #71717a;
        }
        
        .classification {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            text-align: center;
            margin: 2rem 0;
            border: 1px solid;
        }
        
        .recommendation {
            font-size: 1rem;
            margin-top: 0.75rem;
            font-weight: 500;
            opacity: 0.9;
        }
        
        .severely-underpriced, .moderately-underpriced, .slightly-underpriced {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .severely-overpriced, .moderately-overpriced, .slightly-overpriced {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        .well-priced {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border-color: rgba(59, 130, 246, 0.3);
        }
        
        .formula-box {
            background: #0a0a0a;
            border: 1px solid #27272a;
            padding: 2rem;
            border-radius: 12px;
            margin: 2rem 0;
            text-align: center;
        }
        
        .formula-box .formula-label {
            color: #71717a;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .formula {
            font-size: 1.25rem;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            color: #3b82f6;
            margin: 1rem 0;
            font-weight: 500;
        }
        
        .formula-result {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .stat-box {
            background: #0a0a0a;
            border: 1px solid #27272a;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            transition: all 0.2s;
        }
        
        .stat-box:hover {
            border-color: #3f3f46;
            transform: translateY(-2px);
        }
        
        .stat-box .stat-label {
            font-size: 0.75rem;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .stat-box .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            margin-top: 0.5rem;
            color: #ffffff;
        }
        
        .matches-section {
            background: #0a0a0a;
            border: 1px solid #27272a;
            padding: 2rem;
            border-radius: 12px;
            margin: 2rem 0;
        }
        
        .matches-section h3 {
            margin: 0 0 1rem 0;
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 600;
            padding-bottom: 1rem;
            border-bottom: 1px solid #27272a;
        }
        
        .match-card {
            background: #18181b;
            border: 1px solid #27272a;
            padding: 1.5rem;
            border-radius: 10px;
            margin: 1rem 0;
            transition: all 0.2s;
        }
        
        .match-card:hover {
            border-color: #3f3f46;
            transform: translateX(4px);
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .match-info {
            font-size: 0.875rem;
            color: #71717a;
        }
        
        .match-info strong {
            color: #ffffff;
            font-weight: 600;
        }
        
        .combinations-display {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #27272a;
        }
        
        .combinations-label {
            font-size: 0.75rem;
            color: #71717a;
            margin-bottom: 0.75rem;
            font-weight: 500;
        }
        
        .combinations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }
        
        .combination-chip {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .combination-chip.hit {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .combination-chip.miss {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        .combination-maps {
            font-weight: 500;
        }
        
        .combination-kills {
            font-size: 1rem;
        }
        
        #error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            display: none;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .input-group {
                width: 100%;
            }
            
            input[type="number"] {
                max-width: 100%;
            }
            
            button {
                width: 100%;
            }
            
            .over-under-display {
                flex-direction: column;
                gap: 1.5rem;
            }
            
            .player-info h2 {
                font-size: 1.5rem;
            }
            
            .analysis-section table {
                font-size: 0.875rem;
            }
            
            .analysis-section table th,
            .analysis-section table td {
                padding: 0.75rem 0.5rem;
            }
        }
        
        /* Agent & Map Analysis Tables */
        .analysis-section table tbody tr {
            border-bottom: 1px solid #27272a;
            transition: background-color 0.2s ease;
        }
        
        .analysis-section table tbody tr:hover {
            background-color: #27272a;
        }
        
        .analysis-section table tbody tr:last-child {
            border-bottom: none;
        }
        
        .analysis-section table tbody td {
            padding: 1rem;
            color: #a1a1aa;
        }
        
        .analysis-section table thead th {
            position: relative;
        }
        
        .analysis-section table thead th:hover {
            background-color: #3f3f46 !important;
        }
        
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="header-content">
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                <span>ThunderEdge</span>
            </a>
            <nav class="header-nav">
                <a href="/">Player Analysis</a>
                <a href="/team">Team Analysis</a>
                <a href="/prizepicks" style="color: #ffffff; background: #18181b;">PrizePicks</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="hero-section">
            <h1>PrizePicks Kill Line Analytics</h1>
            <p class="subtitle">Analyze combined kills for Maps 1 & 2 (or all 2-map combinations)</p>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <div class="input-group">
                    <label>Player IGN</label>
                    <input type="text" id="playerInput" placeholder="aspas, TenZ, Demon1..." />
                </div>
                <div class="input-group">
                    <label>PrizePicks Line (Maps 1+2 Combined)</label>
                    <input type="number" id="killLine" step="0.5" value="30.5" placeholder="30.5" />
                </div>
                <button onclick="analyzePrizePicks()">Analyze PrizePicks Line</button>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="font-weight: 600; color: #e4e4e7;">Fetching VCT Event Data</p>
            <p style="font-size: 0.875rem;">Scraping match statistics from VLR.gg...</p>
        </div>
        
        <div id="result" class="result">
            <!-- Results will be inserted here -->
        </div>
        
        <div id="error"></div>
    </div>

    <script>
        async function analyzePrizePicks() {
            const ign = document.getElementById('playerInput').value.trim();
            const killLine = document.getElementById('killLine').value;
            
            if (!ign) {
                showError('Please enter a player IGN');
                return;
            }
            
            if (!killLine || killLine <= 0) {
                showError('Please enter a valid kill line');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                const startTime = performance.now();
                const response = await fetch(`/api/prizepicks/${encodeURIComponent(ign)}?line=${killLine}`);
                const data = await response.json();
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
                
                document.getElementById('loading').style.display = 'none';
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                displayResults(data.analysis, elapsed);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showError('Error connecting to server: ' + error.message);
            }
        }
        
        function getClassificationClass(classification) {
            return classification.toLowerCase().replace(/ /g, '-');
        }
        
        function displayResults(analysis, elapsed) {
            const resultDiv = document.getElementById('result');
            
            if (analysis.error) {
                showError(analysis.error);
                return;
            }
            
            const classificationClass = getClassificationClass(analysis.classification);
            const killLine = analysis.kill_line;
            
            // Build match cards HTML grouped by event
            let matchesHtml = '';
            if (analysis.event_sections && analysis.event_sections.length > 0) {
                // Group by event sections
                matchesHtml = analysis.event_sections.map(section => {
                    const eventMatchesHtml = section.matches.map((match, index) => {
                        // Build map scores display
                        const mapScoresHtml = match.map_scores && match.map_scores.length > 0
                            ? match.map_scores.map((score, idx) => `Map ${idx + 1}: <strong>${score}</strong>`).join(' | ')
                            : '';
                        
                        const combinationsHtml = match.combinations.map(combo => {
                            const comboClass = combo.hit ? 'hit' : 'miss';
                            const mapsText = match.num_maps === 2 
                                ? 'Maps 1+2' 
                                : `Maps ${combo.maps[0]}+${combo.maps[1]}`;
                            return `
                                <div class="combination-chip ${comboClass}">
                                    <span class="combination-maps">${mapsText}</span>
                                    <span class="combination-kills">${combo.combined_kills} ${combo.hit ? '✓' : '✗'}</span>
                                </div>
                            `;
                        }).join('');
                        
                        return `
                            <div class="match-card">
                                <div class="match-header">
                                    <div class="match-info">
                                        <strong>Match ${index + 1}</strong>
                                    </div>
                                    <div class="match-info">
                                        ${match.num_maps} maps | ${match.total_combinations} combinations | Hits: <strong style="color: #22c55e;">${match.hits}</strong> | Misses: <strong style="color: #ef4444;">${match.misses}</strong>
                                    </div>
                                </div>
                                ${mapScoresHtml ? `<div class="match-scores" style="padding: 0.75rem 0; color: #a1a1aa; font-size: 0.875rem; border-bottom: 1px solid #27272a;">${mapScoresHtml}</div>` : ''}
                                <div class="combinations-display">
                                    <div class="combinations-label">Combinations (vs ${killLine} line):</div>
                                    <div class="combinations-grid">
                                        ${combinationsHtml}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    return `
                        <div class="event-section" style="margin-bottom: 2rem;">
                            <div class="event-section-header" style="background: #0a0a0a; border: 1px solid #27272a; padding: 1rem 1.5rem; border-radius: 10px; margin-bottom: 1rem;">
                                <h4 style="font-size: 1.125rem; font-weight: 600; color: #3b82f6; margin: 0;">${section.event_name}</h4>
                                <p style="font-size: 0.875rem; color: #71717a; margin: 0.25rem 0 0 0;">${section.total_matches} matches</p>
                            </div>
                            ${eventMatchesHtml}
                        </div>
                    `;
                }).join('');
            } else if (analysis.match_results && analysis.match_results.length > 0) {
                // Fallback to old format if event_sections not available
                matchesHtml = analysis.match_results.map((match, index) => {
                    const mapScoresHtml = match.map_scores && match.map_scores.length > 0
                        ? match.map_scores.map((score, idx) => `Map ${idx + 1}: <strong>${score}</strong>`).join(' | ')
                        : '';
                    
                    const combinationsHtml = match.combinations.map(combo => {
                        const comboClass = combo.hit ? 'hit' : 'miss';
                        const mapsText = match.num_maps === 2 
                            ? 'Maps 1+2' 
                            : `Maps ${combo.maps[0]}+${combo.maps[1]}`;
                        return `
                            <div class="combination-chip ${comboClass}">
                                <span class="combination-maps">${mapsText}</span>
                                <span class="combination-kills">${combo.combined_kills} ${combo.hit ? '✓' : '✗'}</span>
                            </div>
                        `;
                    }).join('');
                    
                    return `
                        <div class="match-card">
                            <div class="match-header">
                                <div class="match-info">
                                    <strong>Match ${index + 1}</strong> ${match.event_name ? `| ${match.event_name}` : ''}
                                </div>
                                <div class="match-info">
                                    ${match.num_maps} maps | ${match.total_combinations} combinations | Hits: <strong style="color: #22c55e;">${match.hits}</strong> | Misses: <strong style="color: #ef4444;">${match.misses}</strong>
                                </div>
                            </div>
                            ${mapScoresHtml ? `<div class="match-scores" style="padding: 0.75rem 0; color: #a1a1aa; font-size: 0.875rem; border-bottom: 1px solid #27272a;">${mapScoresHtml}</div>` : ''}
                            <div class="combinations-display">
                                <div class="combinations-label">Combinations (vs ${killLine} line):</div>
                                <div class="combinations-grid">
                                    ${combinationsHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // Count total matches from event sections
            const totalMatches = analysis.event_sections 
                ? analysis.event_sections.reduce((sum, section) => sum + section.total_matches, 0)
                : (analysis.match_results ? analysis.match_results.length : 0);
            
            resultDiv.innerHTML = `
                <div class="performance-bar">
                    <div class="perf-item">Query Time: <span>${elapsed}s</span></div>
                    <div class="perf-item">Matches Analyzed: <span>${totalMatches}</span></div>
                    <div class="perf-item">Total Combinations: <span>${analysis.total_combinations || 0}</span></div>
                </div>
                
                <div class="player-card">
                    <div class="player-header">
                        <div class="player-info">
                            <h2>${analysis.player_ign}</h2>
                            <span class="team-name">${analysis.team || 'Unknown Team'}</span>
                        </div>
                    </div>
                    
                    <div class="over-under-box">
                        <div class="over-under-title">Historical Hit/Miss vs ${analysis.kill_line} Combined Kill Line</div>
                        <div class="over-under-display">
                            <div class="over-stat">
                                <div class="percentage">${analysis.hit_percentage}%</div>
                                <div class="stat-label">HIT (${analysis.hit_count} combinations)</div>
                            </div>
                            <div class="vs-divider">vs</div>
                            <div class="under-stat">
                                <div class="percentage">${analysis.miss_percentage}%</div>
                                <div class="stat-label">MISS (${analysis.miss_count} combinations)</div>
                            </div>
                        </div>
                        <div class="map-count">Based on ${analysis.total_combinations} map combinations across ${totalMatches} matches</div>
                    </div>
                    
                    <div class="classification ${classificationClass}">
                        ${analysis.classification}
                        <div class="recommendation">${analysis.recommendation}</div>
                    </div>
                </div>
                
                <div class="formula-box">
                    <div class="formula-label">Formula: Kill Line / Weighted KPR = Rounds Needed</div>
                    <div class="formula">${analysis.kill_line} / ${analysis.weighted_kpr} = </div>
                    <div class="formula-result">${analysis.rounds_needed} rounds</div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">PrizePicks Line</div>
                        <div class="stat-value">${analysis.kill_line}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Total KPR</div>
                        <div class="stat-value">${analysis.total_kpr || analysis.weighted_kpr}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Weighted KPR</div>
                        <div class="stat-value" style="color: #f59e0b;">${analysis.weighted_kpr}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Rounds Needed</div>
                        <div class="stat-value">${analysis.rounds_needed}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Hit Rate</div>
                        <div class="stat-value" style="color: #22c55e;">${analysis.hit_percentage}%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Miss Rate</div>
                        <div class="stat-value" style="color: #ef4444;">${analysis.miss_percentage}%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Confidence</div>
                        <div class="stat-value" style="font-size: 1rem;">${analysis.confidence}</div>
                    </div>
                </div>
                
                <div class="matches-section">
                    <h3>Match-by-Match Analysis</h3>
                    <p style="color: #71717a; margin-bottom: 1.5rem; font-size: 0.875rem;">
                        Grouped by event in reverse chronological order (most recent first)<br>
                        For 2-map matches: Shows combined kills from Maps 1+2<br>
                        For 3-map matches: Shows all combinations (Maps 1+2, Maps 1+3, Maps 2+3)
                    </p>
                    ${matchesHtml || '<p style="color: #71717a;">No match data available</p>'}
                </div>
                
                ${renderAgentAnalysis(analysis.agent_analysis, analysis.kill_line)}
                
                ${renderMapAnalysis(analysis.map_analysis, analysis.kill_line)}
                
                ${renderPPMarginStats(analysis.margin_stats, analysis.kill_line)}
            `;
            
            resultDiv.style.display = 'block';
        }
        
        function renderAgentAnalysis(agentData, killLine) {
            if (!agentData || agentData.length === 0) {
                return '';
            }
            
            // Store data globally for sorting
            window.ppAgentData = agentData;
            window.ppKillLine = killLine;
            
            const tableId = 'ppAgentTable';
            const agentRows = renderPPAgentRows(window.ppAgentData, killLine);
            
            return `
                <div class="analysis-section" style="margin-top: 2rem;">
                    <h3 class="section-title" style="display: flex; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 1.5rem;">🎮</span>
                        Agent Performance Breakdown
                    </h3>
                    <p style="color: #71717a; margin-bottom: 1rem; font-size: 0.875rem;">
                        How often does this player hit the ${killLine} kill line with each agent combination • Click column headers to sort
                    </p>
                    <div style="overflow-x: auto;">
                        <table id="${tableId}" style="width: 100%; border-collapse: collapse; background: #18181b; border-radius: 8px; overflow: hidden;">
                            <thead>
                                <tr style="background: #27272a; color: #a1a1aa; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">
                                    <th onclick="sortPPAgentTable('agent_combo')" style="padding: 1rem; text-align: left; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Agent Combo <span id="pp-agent_combo-sort"></span>
                                    </th>
                                    <th onclick="sortPPAgentTable('combinations')" style="padding: 1rem; text-align: center; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Games <span id="pp-combinations-sort"></span>
                                    </th>
                                    <th onclick="sortPPAgentTable('hits')" style="padding: 1rem; text-align: center; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Hits <span id="pp-hits-sort"></span>
                                    </th>
                                    <th onclick="sortPPAgentTable('hit_rate')" style="padding: 1rem; text-align: center; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Hit Rate <span id="pp-hit_rate-sort"></span>
                                    </th>
                                    <th onclick="sortPPAgentTable('avg_kills')" style="padding: 1rem; text-align: center; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Avg Kills <span id="pp-avg_kills-sort"></span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="${tableId}Body">
                                ${agentRows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function renderPPAgentRows(agentData, killLine) {
            return agentData.map(agent => {
                const hitRateColor = agent.hit_rate >= 70 ? '#22c55e' : 
                                    agent.hit_rate >= 50 ? '#f59e0b' : '#ef4444';
                const avgKillsColor = agent.avg_kills > killLine ? '#22c55e' : '#ef4444';
                
                return `
                    <tr>
                        <td style="font-weight: 600; color: #e4e4e7;">${agent.agent_combo}</td>
                        <td style="text-align: center;">${agent.combinations}</td>
                        <td style="text-align: center; font-weight: 600; color: #22c55e;">${agent.hits}</td>
                        <td style="text-align: center; font-weight: 700; color: ${hitRateColor};">${agent.hit_rate}%</td>
                        <td style="text-align: center; font-weight: 600; color: ${avgKillsColor};">${agent.avg_kills}</td>
                    </tr>
                `;
            }).join('');
        }
        
        let ppAgentSortColumn = 'combinations';
        let ppAgentSortDirection = 'desc';
        
        function sortPPAgentTable(column) {
            if (ppAgentSortColumn === column) {
                ppAgentSortDirection = ppAgentSortDirection === 'desc' ? 'asc' : 'desc';
            } else {
                ppAgentSortColumn = column;
                ppAgentSortDirection = 'desc';
            }
            
            const sortedData = [...window.ppAgentData].sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];
                
                if (column === 'agent_combo') {
                    return ppAgentSortDirection === 'desc' 
                        ? bVal.localeCompare(aVal)
                        : aVal.localeCompare(bVal);
                }
                
                aVal = parseFloat(aVal) || 0;
                bVal = parseFloat(bVal) || 0;
                
                return ppAgentSortDirection === 'desc' ? bVal - aVal : aVal - bVal;
            });
            
            document.getElementById('ppAgentTableBody').innerHTML = renderPPAgentRows(sortedData, window.ppKillLine);
            
            document.querySelectorAll('[id^="pp-"][id$="-sort"]').forEach(el => el.textContent = '');
            const indicator = document.getElementById(`pp-${column}-sort`);
            if (indicator) {
                indicator.textContent = ppAgentSortDirection === 'desc' ? ' ↓' : ' ↑';
            }
        }
        
        function renderMapAnalysis(mapData, killLine) {
            if (!mapData || mapData.length === 0) {
                return '';
            }
            
            // Store data globally for sorting
            window.ppMapData = mapData;
            window.ppMapKillLine = killLine;
            
            const tableId = 'ppMapTable';
            const mapRows = renderPPMapRows(window.ppMapData, killLine);
            
            return `
                <div class="analysis-section" style="margin-top: 2rem;">
                    <h3 class="section-title" style="display: flex; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 1.5rem;">🗺️</span>
                        Map Performance Breakdown
                    </h3>
                    <p style="color: #71717a; margin-bottom: 1rem; font-size: 0.875rem;">
                        How often does this player hit the ${killLine} kill line on each map combination • Click column headers to sort
                    </p>
                    <div style="overflow-x: auto;">
                        <table id="${tableId}" style="width: 100%; border-collapse: collapse; background: #18181b; border-radius: 8px; overflow: hidden;">
                            <thead>
                                <tr style="background: #27272a; color: #a1a1aa; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">
                                    <th onclick="sortPPMapTable('map_combo')" style="padding: 1rem; text-align: left; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Map Combo <span id="pp-map_combo-sort"></span>
                                    </th>
                                    <th onclick="sortPPMapTable('combinations')" style="padding: 1rem; text-align: center; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Games <span id="pp-map-combinations-sort"></span>
                                    </th>
                                    <th onclick="sortPPMapTable('hits')" style="padding: 1rem; text-align: center; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Hits <span id="pp-map-hits-sort"></span>
                                    </th>
                                    <th onclick="sortPPMapTable('hit_rate')" style="padding: 1rem; text-align: center; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Hit Rate <span id="pp-map-hit_rate-sort"></span>
                                    </th>
                                    <th onclick="sortPPMapTable('avg_kills')" style="padding: 1rem; text-align: center; font-weight: 600; cursor: pointer; user-select: none; transition: color 0.2s;" onmouseover="this.style.color='#ffffff'" onmouseout="this.style.color='#a1a1aa'">
                                        Avg Kills <span id="pp-map-avg_kills-sort"></span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="${tableId}Body">
                                ${mapRows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function renderPPMapRows(mapData, killLine) {
            return mapData.map(mapInfo => {
                const hitRateColor = mapInfo.hit_rate >= 70 ? '#22c55e' : 
                                    mapInfo.hit_rate >= 50 ? '#f59e0b' : '#ef4444';
                const avgKillsColor = mapInfo.avg_kills > killLine ? '#22c55e' : '#ef4444';
                
                return `
                    <tr>
                        <td style="font-weight: 600; color: #e4e4e7;">${mapInfo.map_combo}</td>
                        <td style="text-align: center;">${mapInfo.combinations}</td>
                        <td style="text-align: center; font-weight: 600; color: #22c55e;">${mapInfo.hits}</td>
                        <td style="text-align: center; font-weight: 700; color: ${hitRateColor};">${mapInfo.hit_rate}%</td>
                        <td style="text-align: center; font-weight: 600; color: ${avgKillsColor};">${mapInfo.avg_kills}</td>
                    </tr>
                `;
            }).join('');
        }
        
        let ppMapSortColumn = 'combinations';
        let ppMapSortDirection = 'desc';
        
        function sortPPMapTable(column) {
            if (ppMapSortColumn === column) {
                ppMapSortDirection = ppMapSortDirection === 'desc' ? 'asc' : 'desc';
            } else {
                ppMapSortColumn = column;
                ppMapSortDirection = 'desc';
            }
            
            const sortedData = [...window.ppMapData].sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];
                
                if (column === 'map_combo') {
                    return ppMapSortDirection === 'desc' 
                        ? bVal.localeCompare(aVal)
                        : aVal.localeCompare(bVal);
                }
                
                aVal = parseFloat(aVal) || 0;
                bVal = parseFloat(bVal) || 0;
                
                return ppMapSortDirection === 'desc' ? bVal - aVal : aVal - bVal;
            });
            
            document.getElementById('ppMapTableBody').innerHTML = renderPPMapRows(sortedData, window.ppMapKillLine);
            
            document.querySelectorAll('[id^="pp-map-"][id$="-sort"]').forEach(el => el.textContent = '');
            const indicator = document.getElementById(`pp-map-${column}-sort`);
            if (indicator) {
                indicator.textContent = ppMapSortDirection === 'desc' ? ' ↓' : ' ↑';
            }
        }
        
        function renderPPMarginStats(marginStats, killLine) {
            if (!marginStats || marginStats.total_matches === 0) {
                return '';
            }
            
            return `
                <div class="over-under-box" style="margin-top: 2rem;">
                    <div class="over-under-title">Performance Breakdown: Match Win/Loss & Margin Analysis</div>
                    <p style="color: #71717a; margin-bottom: 1rem; font-size: 0.875rem;">
                        Analyzing how player performs in won vs. lost matches • Match margins: Close (2-1) vs. Blowout (2-0)
                    </p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
                        <!-- Wins Column -->
                        <div style="background: rgba(34, 197, 94, 0.05); border: 1px solid rgba(34, 197, 94, 0.2); border-radius: 10px; padding: 2rem;">
                            <div style="text-align: center; margin-bottom: 1.5rem;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: #22c55e; text-transform: uppercase; letter-spacing: 0.05em;">Won Matches</div>
                                <div style="color: #71717a; font-size: 0.875rem; margin-top: 0.25rem;">${marginStats.total_wins} matches</div>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                                <div style="display: flex; justify-content: space-around; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px;">
                                    <div style="text-align: center;">
                                        <div style="font-size: 2.5rem; font-weight: 700; color: #22c55e; line-height: 1;">${marginStats.wins_over_pct}%</div>
                                        <div style="color: #a1a1aa; font-size: 0.75rem; text-transform: uppercase; margin-top: 0.5rem; letter-spacing: 0.05em;">Over</div>
                                    </div>
                                    <div style="color: #3f3f46; font-size: 1.5rem; font-weight: 700; align-self: center;">vs</div>
                                    <div style="text-align: center;">
                                        <div style="font-size: 2.5rem; font-weight: 700; color: #ef4444; line-height: 1;">${marginStats.wins_under_pct}%</div>
                                        <div style="color: #a1a1aa; font-size: 0.75rem; text-transform: uppercase; margin-top: 0.5rem; letter-spacing: 0.05em;">Under</div>
                                    </div>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                                    ${renderPPMarginRow('Close (2-1)', marginStats.wins.close)}
                                    ${renderPPMarginRow('Blowout (2-0)', marginStats.wins.blowout)}
                                </div>
                            </div>
                        </div>
                        
                        <!-- Losses Column -->
                        <div style="background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 10px; padding: 2rem;">
                            <div style="text-align: center; margin-bottom: 1.5rem;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: #ef4444; text-transform: uppercase; letter-spacing: 0.05em;">Lost Matches</div>
                                <div style="color: #71717a; font-size: 0.875rem; margin-top: 0.25rem;">${marginStats.total_losses} matches</div>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                                <div style="display: flex; justify-content: space-around; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px;">
                                    <div style="text-align: center;">
                                        <div style="font-size: 2.5rem; font-weight: 700; color: #22c55e; line-height: 1;">${marginStats.losses_over_pct}%</div>
                                        <div style="color: #a1a1aa; font-size: 0.75rem; text-transform: uppercase; margin-top: 0.5rem; letter-spacing: 0.05em;">Over</div>
                                    </div>
                                    <div style="color: #3f3f46; font-size: 1.5rem; font-weight: 700; align-self: center;">vs</div>
                                    <div style="text-align: center;">
                                        <div style="font-size: 2.5rem; font-weight: 700; color: #ef4444; line-height: 1;">${marginStats.losses_under_pct}%</div>
                                        <div style="color: #a1a1aa; font-size: 0.75rem; text-transform: uppercase; margin-top: 0.5rem; letter-spacing: 0.05em;">Under</div>
                                    </div>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                                    ${renderPPMarginRow('Close (2-1)', marginStats.losses.close)}
                                    ${renderPPMarginRow('Blowout (2-0)', marginStats.losses.blowout)}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="map-count" style="margin-top: 1.5rem;">Analyzing ${marginStats.total_matches} matches with score data (${marginStats.total_wins} wins, ${marginStats.total_losses} losses)</div>
                </div>
            `;
        }
        
        function renderPPMarginRow(label, data) {
            if (data.total === 0) {
                return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: rgba(0,0,0,0.1); border-radius: 6px; opacity: 0.5;">
                        <span style="color: #71717a; font-size: 0.875rem;">${label}</span>
                        <span style="color: #71717a; font-size: 0.75rem;">No data</span>
                    </div>
                `;
            }
            
            return `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; background: rgba(0,0,0,0.1); border-radius: 6px;">
                    <span style="color: #e4e4e7; font-size: 0.875rem; font-weight: 500;">${label}</span>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <span style="color: #22c55e; font-weight: 600; font-size: 0.875rem;">${data.over_pct}% Over</span>
                        <span style="color: #3f3f46;">•</span>
                        <span style="color: #ef4444; font-weight: 600; font-size: 0.875rem;">${data.under_pct}% Under</span>
                        <span style="color: #71717a; font-size: 0.75rem; margin-left: 0.25rem;">(${data.total})</span>
                    </div>
                </div>
            `;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        // Allow Enter key to trigger search
        document.getElementById('playerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzePrizePicks();
            }
        });
        
        document.getElementById('killLine').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzePrizePicks();
            }
        });
    </script>
</body>
</html>
