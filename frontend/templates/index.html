<body>
    <header class="page-header">
        <div class="header-content">
            <a href="/" class="logo" style="text-decoration: none;">
                <div class="logo-icon">⚡</div>
                <span>ThunderEdge</span>
            </a>
            <nav class="header-nav">
                <a href="/" style="color: #ffffff; background: #18181b;">Player Analysis</a>
                <a href="/team" style="color: #a1a1aa;">Team Analysis</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="hero-section">
            <h1>VCT Kill Line Analytics</h1>
            <p class="subtitle">Advanced statistical analysis for Valorant esports betting lines</p>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <div class="input-group">
                    <label>Player IGN</label>
                    <input type="text" id="playerInput" placeholder="aspas, TenZ, Demon1..." />
                </div>
                <div class="input-group">
                    <label>Kill Line (O/U)</label>
                    <input type="number" id="killLine" step="0.5" value="15.5" placeholder="15.5" />
                </div>
                <div class="input-group">
                    <label>Over Odds (e.g., +100, -200)</label>
                    <input type="text" id="overOdds" placeholder="+100" />
                </div>
                <div class="input-group">
                    <label>Under Odds (e.g., +100, -200)</label>
                    <input type="text" id="underOdds" placeholder="+100" />
                </div>
                <button onclick="analyzePlayer()">Analyze Player</button>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="font-weight: 600; color: #e4e4e7;">Fetching VCT Event Data</p>
            <p style="font-size: 0.875rem;">Scraping match statistics from VLR.gg...</p>
        </div>
        
        <div id="result" class="result">
            <!-- Results will be inserted here -->
        </div>
        
        <div id="error"></div>
    </div>

    <script>
        function calculateBreakEven(odds) {
            // Parse odds string (e.g., "+100", "-200", "100", "-150")
            if (!odds || odds.trim() === '') return null;
            
            const cleanOdds = odds.trim().replace(/[+$]/g, '');
            const numOdds = parseInt(cleanOdds);
            
            if (isNaN(numOdds)) return null;
            
            if (numOdds > 0) {
                // Positive odds: +100, +150, etc.
                // Break-even = 100 / (odds + 100)
                return (100 / (numOdds + 100)) * 100;
            } else {
                // Negative odds: -200, -150, etc.
                // Break-even = |odds| / (|odds| + 100)
                const absOdds = Math.abs(numOdds);
                return (absOdds / (absOdds + 100)) * 100;
            }
        }
        
        async function analyzePlayer() {
            const ign = document.getElementById('playerInput').value.trim();
            const killLine = document.getElementById('killLine').value;
            const overOdds = document.getElementById('overOdds').value.trim();
            const underOdds = document.getElementById('underOdds').value.trim();
            
            if (!ign) {
                showError('Please enter a player IGN');
                return;
            }
            
            if (!killLine || killLine <= 0) {
                showError('Please enter a valid kill line');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                const startTime = performance.now();
                const response = await fetch(`http://localhost:5000/api/player/${encodeURIComponent(ign)}?line=${killLine}`);
                const data = await response.json();
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
                
                document.getElementById('loading').style.display = 'none';
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                displayResults(data.analysis, data.raw_events, elapsed, overOdds, underOdds);
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showError('Error connecting to server: ' + error.message);
            }
        }
        
        function getClassificationClass(classification) {
            return classification.toLowerCase().replace(/ /g, '-');
        }
        
        function displayResults(analysis, rawEvents, elapsed, overOdds, underOdds) {
            const resultDiv = document.getElementById('result');
            
            if (analysis.error) {
                showError(analysis.error);
                return;
            }
            
            const classificationClass = getClassificationClass(analysis.classification);
            const killLine = analysis.kill_line;
            
            // Count cached vs live events
            let cachedCount = 0;
            let liveCount = 0;
            if (analysis.event_details) {
                analysis.event_details.forEach(e => {
                    if (e.cached) cachedCount++;
                    else liveCount++;
                });
            }
            
            // Build event cards HTML with map kills
            let eventCardsHtml = '';
            if (analysis.event_details && analysis.event_details.length > 0) {
                eventCardsHtml = analysis.event_details.map((event, index) => {
                    // Build map kills chips
                    let mapKillsHtml = '';
                    if (event.map_kills && event.map_kills.length > 0) {
                        const chips = event.map_kills.map(kills => {
                            const isOver = kills > killLine;
                            return `<span class="kill-chip ${isOver ? 'over' : 'under'}">${kills} ${isOver ? '✓' : '✗'}</span>`;
                        }).join('');
                        mapKillsHtml = `
                            <div class="map-kills-display">
                                <div class="map-kills-label">Kills per map (vs ${killLine} line):</div>
                                <div class="map-kills-chips">${chips}</div>
                            </div>
                        `;
                    }
                    
                    const overUnderText = event.event_maps > 0 
                        ? `Over: ${event.event_over}/${event.event_maps} | Under: ${event.event_under}/${event.event_maps}`
                        : '';
                    
                    const isCached = event.cached;
                    const badgeClass = isCached ? 'cached' : 'live';
                    const badgeText = isCached ? 'CACHED' : 'LIVE';
                    
                    return `
                        <div class="event-card ${badgeClass}">
                            <div class="event-header">
                                <div class="event-name">${event.event_name}</div>
                                <span class="event-badge ${badgeClass}">${badgeText}</span>
                            </div>
                            <div class="event-stats">
                                <div class="event-stat">KPR: <span>${event.kpr}</span></div>
                                <div class="event-stat">Rounds: <span>${event.rounds}</span></div>
                                <div class="event-stat">Rating: <span>${event.rating}</span></div>
                                <div class="event-stat">ACS: <span>${event.acs}</span></div>
                                ${overUnderText ? `<div class="event-stat">${overUnderText}</div>` : ''}
                            </div>
                            ${mapKillsHtml}
                        </div>
                    `;
                }).join('');
            }
            
            // Calculate odds analysis HTML
            let oddsAnalysisHtml = '';
            if (overOdds || underOdds) {
                let overHtml = '';
                let underHtml = '';
                
                if (overOdds) {
                    const overBreakEven = calculateBreakEven(overOdds);
                    if (overBreakEven !== null) {
                        const overHistorical = analysis.over_percentage;
                        const overEdge = overHistorical - overBreakEven;
                        const overProfitable = overEdge > 0;
                        overHtml = `
                            <div style="background: #0a0a0a; padding: 1rem; border-radius: 8px; border: 1px solid #27272a;">
                                <div style="font-size: 0.875rem; color: #71717a; margin-bottom: 0.5rem;">OVER Bet</div>
                                <div style="font-size: 0.875rem; color: #ffffff; margin-bottom: 0.25rem;">Odds: <strong>${overOdds}</strong></div>
                                <div style="font-size: 0.875rem; color: #71717a; margin-bottom: 0.25rem;">Break-even: <strong style="color: #ffffff;">${overBreakEven.toFixed(2)}%</strong></div>
                                <div style="font-size: 0.875rem; color: #71717a; margin-bottom: 0.25rem;">Historical: <strong style="color: #22c55e;">${overHistorical}%</strong></div>
                                <div style="font-size: 0.875rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #27272a;">
                                    <span style="color: #71717a;">Edge: </span>
                                    <strong style="color: ${overProfitable ? '#22c55e' : '#ef4444'};">
                                        ${overEdge > 0 ? '+' : ''}${overEdge.toFixed(2)}%
                                    </strong>
                                    <span style="color: ${overProfitable ? '#22c55e' : '#ef4444'}; margin-left: 0.5rem;">
                                        ${overProfitable ? '✓ Profitable' : '✗ Not Profitable'}
                                    </span>
                                </div>
                            </div>
                        `;
                    } else {
                        overHtml = `
                            <div style="background: #0a0a0a; padding: 1rem; border-radius: 8px; border: 1px solid #27272a;">
                                <div style="font-size: 0.875rem; color: #71717a; margin-bottom: 0.5rem;">OVER Bet</div>
                                <div style="color: #ef4444; font-size: 0.875rem;">Invalid odds format</div>
                            </div>
                        `;
                    }
                }
                
                if (underOdds) {
                    const underBreakEven = calculateBreakEven(underOdds);
                    if (underBreakEven !== null) {
                        const underHistorical = analysis.under_percentage;
                        const underEdge = underHistorical - underBreakEven;
                        const underProfitable = underEdge > 0;
                        underHtml = `
                            <div style="background: #0a0a0a; padding: 1rem; border-radius: 8px; border: 1px solid #27272a;">
                                <div style="font-size: 0.875rem; color: #71717a; margin-bottom: 0.5rem;">UNDER Bet</div>
                                <div style="font-size: 0.875rem; color: #ffffff; margin-bottom: 0.25rem;">Odds: <strong>${underOdds}</strong></div>
                                <div style="font-size: 0.875rem; color: #71717a; margin-bottom: 0.25rem;">Break-even: <strong style="color: #ffffff;">${underBreakEven.toFixed(2)}%</strong></div>
                                <div style="font-size: 0.875rem; color: #71717a; margin-bottom: 0.25rem;">Historical: <strong style="color: #ef4444;">${underHistorical}%</strong></div>
                                <div style="font-size: 0.875rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #27272a;">
                                    <span style="color: #71717a;">Edge: </span>
                                    <strong style="color: ${underProfitable ? '#22c55e' : '#ef4444'};">
                                        ${underEdge > 0 ? '+' : ''}${underEdge.toFixed(2)}%
                                    </strong>
                                    <span style="color: ${underProfitable ? '#22c55e' : '#ef4444'}; margin-left: 0.5rem;">
                                        ${underProfitable ? '✓ Profitable' : '✗ Not Profitable'}
                                    </span>
                                </div>
                            </div>
                        `;
                    } else {
                        underHtml = `
                            <div style="background: #0a0a0a; padding: 1rem; border-radius: 8px; border: 1px solid #27272a;">
                                <div style="font-size: 0.875rem; color: #71717a; margin-bottom: 0.5rem;">UNDER Bet</div>
                                <div style="color: #ef4444; font-size: 0.875rem;">Invalid odds format</div>
                            </div>
                        `;
                    }
                }
                
                oddsAnalysisHtml = `
                    <div class="odds-analysis-box" style="background: #18181b; border: 1px solid #27272a; padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0;">
                        <div style="font-size: 1.1rem; font-weight: 600; color: #ffffff; margin-bottom: 1rem;">Odds Analysis & Profitability</div>
                        <div style="display: grid; grid-template-columns: ${overOdds && underOdds ? '1fr 1fr' : '1fr'}; gap: 1rem;">
                            ${overHtml}
                            ${underHtml}
                        </div>
                        <div style="font-size: 0.75rem; color: #71717a; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #27272a;">
                            <strong>How to read:</strong> Break-even % is the win rate needed to profit. If historical % exceeds break-even, the bet is profitable.
                        </div>
                    </div>
                `;
            }
            
            resultDiv.innerHTML = `
                <div class="performance-bar">
                    <div class="perf-item">Query Time: <span>${elapsed}s</span></div>
                    <div class="perf-item">Events: <span>${cachedCount} cached</span> / <span class="live-badge">${liveCount} live</span></div>
                    <div class="perf-item">Maps Analyzed: <span>${analysis.total_maps}</span></div>
                </div>
                
                <div class="player-card">
                    <div class="player-header">
                        <div class="player-info">
                            <h2>${analysis.player_ign}</h2>
                            <span class="team-name">${analysis.team || 'Unknown Team'}</span>
                        </div>
                    </div>
                    
                    <div class="over-under-box">
                        <div class="over-under-title">Historical Over/Under vs ${analysis.kill_line} Kill Line</div>
                        <div class="over-under-display">
                            <div class="over-stat">
                                <div class="percentage">${analysis.over_percentage}%</div>
                                <div class="stat-label">OVER (${analysis.over_count} maps)</div>
                            </div>
                            <div class="vs-divider">vs</div>
                            <div class="under-stat">
                                <div class="percentage">${analysis.under_percentage}%</div>
                                <div class="stat-label">UNDER (${analysis.under_count} maps)</div>
                            </div>
                        </div>
                        <div class="map-count">Based on ${analysis.total_maps} maps across ${analysis.events_analyzed} VCT events</div>
                    </div>
                    
                    ${oddsAnalysisHtml}
                    
                    <div class="classification ${classificationClass}">
                        ${analysis.classification}
                        <div class="recommendation">${analysis.recommendation}</div>
                    </div>
                </div>
                
                <div class="formula-box">
                    <div class="formula-label">Formula: Kill Line / Weighted KPR = Rounds Needed</div>
                    <div class="formula">${analysis.kill_line} / ${analysis.weighted_kpr} = </div>
                    <div class="formula-result">${analysis.rounds_needed} rounds</div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Kill Line</div>
                        <div class="stat-value">${analysis.kill_line}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Total KPR</div>
                        <div class="stat-value">${analysis.total_kpr || analysis.weighted_kpr}</div>
                        <div class="stat-hint" style="font-size: 0.65rem; color: #71717a; margin-top: 0.25rem;">Weighted by rounds</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Weighted KPR</div>
                        <div class="stat-value" style="color: #f59e0b;">${analysis.weighted_kpr}</div>
                        <div class="stat-hint" style="font-size: 0.65rem; color: #71717a; margin-top: 0.25rem;">1.5x recent event</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Rounds Needed</div>
                        <div class="stat-value">${analysis.rounds_needed}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Over Rate</div>
                        <div class="stat-value" style="color: #22c55e;">${analysis.over_percentage}%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Under Rate</div>
                        <div class="stat-value" style="color: #ef4444;">${analysis.under_percentage}%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Confidence</div>
                        <div class="stat-value" style="font-size: 1rem;">${analysis.confidence}</div>
                    </div>
                </div>
                
                <div class="events-section">
                    <h3>VCT Events Analyzed</h3>
                    <p>
                        Total KPR: ${analysis.total_kpr || analysis.weighted_kpr} | Weighted KPR: ${analysis.weighted_kpr} | Total Rounds: ${analysis.total_rounds}
                    </p>
                    ${eventCardsHtml || '<p style="color: #71717a;">No event details available</p>'}
                </div>
                
                ${analysis.all_map_kills && analysis.all_map_kills.length > 0 ? `
                <details class="debug-section">
                    <summary>All Map Kills Data (${analysis.all_map_kills.length} maps)</summary>
                    <pre>${JSON.stringify(analysis.all_map_kills, null, 2)}</pre>
                </details>
                ` : ''}
            `;
            
            resultDiv.style.display = 'block';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        // Allow Enter key to trigger search
        document.getElementById('playerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzePlayer();
            }
        });
    </script>
</body>
</html>
